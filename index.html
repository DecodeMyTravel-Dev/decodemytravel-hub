<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Decode My Travel | Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 text-white font-sans min-h-screen p-4 md:p-8">

    <header class="max-w-4xl mx-auto mb-8 text-center">
        <h1 class="text-3xl font-black text-cyan-400 tracking-tighter">DECODE MY TRAVEL</h1>
        <p class="text-slate-500 text-xs font-bold uppercase tracking-widest mt-1">Universal Logistics Hub v1.0</p>
    </header>

    <main class="max-w-4xl mx-auto grid grid-cols-1 md:grid-cols-2 gap-6">

        <section class="bg-slate-900 border border-slate-800 p-6 rounded-2xl shadow-xl">
            <h2 class="text-cyan-400 font-bold mb-4 uppercase text-sm tracking-tight italic">// 01. Drink Package Logic</h2>
            <div class="space-y-4">
                <input type="number" id="pkgPrice" placeholder="Package Cost (e.g. 75)" class="w-full bg-slate-800 border border-slate-700 rounded-lg p-3 text-sm">
                <div class="grid grid-cols-2 gap-3">
                    <input type="number" id="qtyCocktails" placeholder="Cocktails" class="bg-slate-800 border border-slate-700 rounded-lg p-3 text-sm">
                    <input type="number" id="qtyBeers" placeholder="Beers" class="bg-slate-800 border border-slate-700 rounded-lg p-3 text-sm">
                </div>
                <button onclick="decodeDrinks()" class="w-full bg-cyan-500 text-slate-900 font-black py-3 rounded-lg text-sm hover:bg-cyan-400 transition">DECODE VALUE</button>
                <div id="drinkRes" class="hidden p-3 bg-slate-950 rounded-lg border border-slate-800 text-center">
                    <p id="drinkOutcome" class="font-bold text-lg"></p>
                </div>
            </div>
        </section>

        <section class="bg-slate-900 border border-slate-800 p-6 rounded-2xl shadow-xl">
            <h2 class="text-cyan-400 font-bold mb-4 uppercase text-sm tracking-tight italic">// 02. Baggage Weight Shield</h2>
            <div class="space-y-4">
                <div class="flex gap-2">
                    <input type="number" id="weightInput" placeholder="Enter Weight" class="flex-1 bg-slate-800 border border-slate-700 rounded-lg p-3 text-sm">
                    <select id="unit" class="bg-slate-800 border border-slate-700 rounded-lg p-3 text-sm uppercase font-bold text-cyan-400">
                        <option value="lb">LB</option>
                        <option value="kg">KG</option>
                    </select>
                </div>
                <button onclick="convertWeight()" class="w-full bg-slate-700 text-white font-bold py-3 rounded-lg text-sm hover:bg-slate-600 transition">CONVERT</button>
                <div id="weightRes" class="hidden p-3 bg-slate-950 rounded-lg border border-slate-800 text-center font-mono text-cyan-400"></div>
                <p class="text-[10px] text-slate-500 uppercase text-center">Standard Limit: 50 LB (23 KG)</p>
            </div>
        </section>

    </main>

    <script>
        function decodeDrinks() {
            const pkg = parseFloat(document.getElementById('pkgPrice').value) || 0;
            const c = (parseInt(document.getElementById('qtyCocktails').value) || 0) * 14;
            const b = (parseInt(document.getElementById('qtyBeers').value) || 0) * 8;
            const totalWithTip = (c + b) * 1.20; // 2026 Tips for A La Carte
            
            const res = document.getElementById('drinkRes');
            const out = document.getElementById('drinkOutcome');
            res.classList.remove('hidden');
            
            if (totalWithTip >= pkg) {
                out.innerText = "✅ WORTH IT";
                out.className = "font-bold text-lg text-green-400";
            } else {
                out.innerText = "❌ NOT WORTH IT";
                out.className = "font-bold text-lg text-red-500";
            }
        }

        function convertWeight() {
            const val = parseFloat(document.getElementById('weightInput').value) || 0;
            const unit = document.getElementById('unit').value;
            const res = document.getElementById('weightRes');
            res.classList.remove('hidden');

            if (unit === 'lb') {
                res.innerText = val + " LB = " + (val * 0.453592).toFixed(1) + " KG";
            } else {
                res.innerText = val + " KG = " + (val * 2.20462).toFixed(1) + " LB";
            }
        }
    </script>
</body>
</html>
