<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Decode My Travel | Logistics Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 text-white font-sans min-h-screen p-4 md:p-8">

    <header class="max-w-4xl mx-auto mb-8 text-center">
        <h1 class="text-3xl font-black text-cyan-400 tracking-tighter uppercase">Decode My Travel</h1>
        <p class="text-slate-500 text-xs font-bold uppercase tracking-widest mt-1">Universal Logistics Hub // May 2026</p>
    </header>

    <main class="max-w-4xl mx-auto grid grid-cols-1 md:grid-cols-2 gap-6">

        <section class="bg-slate-900 border border-slate-800 p-6 rounded-2xl shadow-xl flex flex-col justify-between">
            <div>
                <h2 class="text-cyan-400 font-bold mb-4 uppercase text-sm tracking-tight italic">// 01. Drink Package Logic</h2>
                <div class="space-y-4">
                    <div>
                        <label class="block text-[10px] text-slate-500 font-bold mb-1 uppercase">Daily Package Cost ($)</label>
                        <input type="number" id="pkgPrice" value="75" class="w-full bg-slate-800 border border-slate-700 rounded-lg p-3 text-sm focus:ring-1 focus:ring-cyan-500 outline-none">
                    </div>
                    <div class="grid grid-cols-2 gap-3">
                        <div>
                            <label class="block text-[10px] text-slate-500 font-bold mb-1 uppercase">Cocktails/Day</label>
                            <input type="number" id="qtyCocktails" value="4" class="w-full bg-slate-800 border border-slate-700 rounded-lg p-3 text-sm">
                        </div>
                        <div>
                            <label class="block text-[10px] text-slate-500 font-bold mb-1 uppercase">Beers/Day</label>
                            <input type="number" id="qtyBeers" value="2" class="w-full bg-slate-800 border border-slate-700 rounded-lg p-3 text-sm">
                        </div>
                    </div>
                    <button onclick="decodeDrinks()" class="w-full bg-cyan-500 text-slate-900 font-black py-3 rounded-lg text-sm hover:bg-cyan-400 transition">DECODE VALUE</button>
                    <div id="drinkRes" class="hidden p-3 bg-slate-950 rounded-lg border border-slate-800 text-center">
                        <p id="drinkOutcome" class="font-bold text-lg"></p>
                        <p id="drinkDetails" class="text-[10px] text-slate-500 mt-1 uppercase italic"></p>
                    </div>
                </div>
            </div>
        </section>

        <section class="bg-slate-900 border border-slate-800 p-6 rounded-2xl shadow-xl flex flex-col justify-between">
            <div>
                <h2 class="text-cyan-400 font-bold mb-4 uppercase text-sm tracking-tight italic">// 02. Baggage Weight Shield</h2>
                <div class="space-y-4">
                    <div class="flex gap-2">
                        <input type="number" id="weightInput" placeholder="Value" class="flex-1 bg-slate-800 border border-slate-700 rounded-lg p-3 text-sm focus:ring-1 focus:ring-cyan-500 outline-none">
                        <select id="unit" class="bg-slate-800 border border-slate-700 rounded-lg p-3 text-sm font-bold text-cyan-400">
                            <option value="lb">LB</option>
                            <option value="kg">KG</option>
                        </select>
                    </div>
                    <button onclick="convertWeight()" class="w-full bg-slate-700 text-white font-bold py-3 rounded-lg text-sm hover:bg-slate-600 transition uppercase tracking-widest">Convert</button>
                    <div id="weightRes" class="hidden p-3 bg-slate-950 rounded-lg border border-slate-800 text-center font-mono text-cyan-400 text-lg"></div>
                    <div class="bg-slate-950 p-3 rounded-lg border border-slate-800">
                        <p class="text-[10px] text-slate-500 uppercase font-bold mb-2 text-center underline">2026 Airline Limits</p>
                        <div class="flex justify-between text-[10px] text-slate-400">
                            <span>Main Cabin (AA/DL/UA)</span>
                            <span class="font-bold text-white">50 LB / 23 KG</span>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <section class="bg-slate-900 border border-slate-800 p-6 rounded-2xl shadow-xl col-md-span-2">
            <h2 class="text-cyan-400 font-bold mb-4 uppercase text-sm tracking-tight italic">// 03. Tipping Compass</h2>
            <div class="space-y-4">
                <select id="portSelect" class="w-full bg-slate-800 border border-slate-700 rounded-lg p-3 text-sm text-white">
                    <option value="" disabled selected>Select Destination</option>
                    <option value="mexico">Mexico (Cozumel/Costa Maya)</option>
                    <option value="bahamas">The Bahamas (Nassau/CocoCay)</option>
                    <option value="europe">Western Europe (Spain/Italy)</option>
                    <option value="caribbean">Eastern Caribbean (St. Maarten/Antigua)</option>
                </select>
                <button onclick="decodeTips()" class="w-full bg-cyan-500 text-slate-900 font-black py-3 rounded-lg text-sm hover:bg-cyan-400 transition">DECODE ETIQUETTE</button>
                <div id="tipRes" class="hidden p-4 bg-slate-950 rounded-lg border border-slate-800">
                    <p id="tipOutcome" class="text-xs leading-relaxed text-slate-300"></p>
                </div>
            </div>
        </section>

    </main>

    <footer class="max-w-4xl mx-auto mt-12 text-center text-slate-600">
        <p class="text-[10px] uppercase tracking-tighter">© 2026 Decode My Travel. All calculations based on fleet averages & current DOT/MARPOL regulations.</p>
    </footer>

    <script>
        function decodeDrinks() {
            const pkg = parseFloat(document.getElementById('pkgPrice').value) || 0;
            const c = (parseInt(document.getElementById('qtyCocktails').value) || 0) * 14;
            const b = (parseInt(document.getElementById('qtyBeers').value) || 0) * 8;
            const totalWithTip = (c + b) * 1.20; 
            
            const res = document.getElementById('drinkRes');
            const out = document.getElementById('drinkOutcome');
            const details = document.getElementById('drinkDetails');
            res.classList.remove('hidden');
            
            if (totalWithTip >= pkg) {
                out.innerText = "✅ WORTH IT";
                out.className = "font-bold text-lg text-green-400";
                details.innerText = "Includes 20% savings over a la carte";
            } else {
                out.innerText = "❌ NOT WORTH IT";
                out.className = "font-bold text-lg text-red-500";
                details.innerText = "You're overpaying for the package";
            }
        }

        function convertWeight() {
