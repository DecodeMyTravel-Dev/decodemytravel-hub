<script>
        // TOOL 1: DRINK LOGIC
        function decodeDrinks() {
            const pkg = parseFloat(document.getElementById('pkgPrice').value) || 0;
            const c = (parseInt(document.getElementById('qtyCocktails').value) || 0) * 14;
            const b = (parseInt(document.getElementById('qtyBeers').value) || 0) * 8;
            const totalWithTip = (c + b) * 1.20; 
            
            const res = document.getElementById('drinkRes');
            const out = document.getElementById('drinkOutcome');
            const details = document.getElementById('drinkDetails');
            res.classList.remove('hidden');
            
            if (totalWithTip >= pkg) {
                out.innerText = "✅ WORTH IT";
                out.className = "font-bold text-lg text-green-400";
                details.innerText = "Includes 20% savings over a la carte";
            } else {
                out.innerText = "❌ NOT WORTH IT";
                out.className = "font-bold text-lg text-red-500";
                details.innerText = "You're overpaying for the package";
            }
        }

        // TOOL 2: WEIGHT LOGIC
        function convertWeight() {
            const val = parseFloat(document.getElementById('weightInput').value) || 0;
            const unit = document.getElementById('unit').value;
            const res = document.getElementById('weightRes');
            res.classList.remove('hidden');

            if (unit === 'lb') {
                res.innerText = val + " LB = " + (val * 0.453592).toFixed(1) + " KG";
            } else {
                res.innerText = val + " KG = " + (val * 2.20462).toFixed(1) + " LB";
            }
        }

        // TOOL 3: TIP LOGIC (FIXED)
        function decodeTips() {
            const selectEl = document.getElementById('portSelect');
            const port = selectEl.value;
            const res = document.getElementById('tipRes');
            const out = document.getElementById('tipOutcome');

            const guides = {
                "mexico": "🇲🇽 10-15% is standard for guides. In 2026, USD $1 bills are still king for quick tips in Cozumel/Costa Maya. Check the bill for 'Propina' before adding more.",
                "bahamas": "🇧🇸 Nassau/CocoCay restaurants now almost universally include a 15% service charge. $2-5 for luggage/shuttles is appropriate.",
                "europe": "🇪🇺 Tipping is a gesture, not a requirement. Round up the change for coffee; €2-5 total for a nice dinner. Drivers expect nothing unless service is exceptional.",
                "caribbean": "🇰🇳 St. Maarten/Antigua: Standards follow US rules (15%) unless 'Service Included' is printed on the receipt. Check carefully."
            };

            if (port in guides) {
                out.innerText = guides[port];
                res.classList.remove('hidden');
            } else {
                alert("Please select a destination first.");
            }
        }
    </script>
