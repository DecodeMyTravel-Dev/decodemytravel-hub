<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Decode My Travel | Logistics Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-track { background: #0f172a; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #22d3ee; border-radius: 10px; }
        .tab-active { border-bottom: 2px solid #22d3ee; color: #22d3ee; }
        .chip-checkbox { display: none; }
        .chip-label { cursor: pointer; transition: all 0.2s; border: 1px solid #334155; display: flex; align-items: center; justify-content: center; height: 3rem; border-radius: 0.75rem; font-size: 0.7rem; text-align: center; padding: 0.5rem; }
        .chip-checkbox:checked + .chip-label { background-color: #06b6d4; border-color: #06b6d4; color: #0f172a; font-weight: 900; }
    </style>
</head>
<body class="bg-slate-950 text-white font-sans min-h-screen p-4 md:p-10">

    <header class="max-w-7xl mx-auto mb-10 text-center">
        <h1 class="text-4xl font-black text-cyan-400 tracking-tighter uppercase">Decode My Travel</h1>
        <p class="text-slate-500 text-xs font-bold uppercase tracking-[0.3em] mt-2 italic">Intelligence for 2026 Travelers</p>
    </header>

    <main class="max-w-7xl mx-auto grid grid-cols-1 lg:grid-cols-12 gap-8">

        <div class="lg:col-span-5 space-y-6">
            
            <section class="bg-slate-900 border border-slate-800 p-6 rounded-3xl shadow-2xl">
                <h2 class="text-cyan-400 font-bold mb-6 uppercase text-[11px] tracking-widest italic">Drink Package Decoder</h2>
                <div class="space-y-4">
                    <div>
                        <label class="block text-[10px] text-slate-500 font-black uppercase mb-1">Daily Package Cost ($)</label>
                        <input type="number" id="pkgPrice" value="75" class="w-full bg-slate-800 border border-slate-700 rounded-xl p-4 text-sm outline-none">
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-[10px] text-slate-500 font-black uppercase mb-1">Avg Cocktail $</label>
                            <input type="number" id="avgCocktail" value="14" class="w-full bg-slate-800 border border-slate-700 rounded-xl p-4 text-sm outline-none">
                        </div>
                        <div>
                            <label class="block text-[10px] text-slate-500 font-black uppercase mb-1">Avg Beer $</label>
                            <input type="number" id="avgBeer" value="8" class="w-full bg-slate-800 border border-slate-700 rounded-xl p-4 text-sm outline-none">
                        </div>
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-[10px] text-slate-500 font-black uppercase mb-1">Cocktails / Day</label>
                            <input type="number" id="qtyCocktails" value="4" class="w-full bg-slate-800 border border-slate-700 rounded-xl p-4 text-sm outline-none">
                        </div>
                        <div>
                            <label class="block text-[10px] text-slate-500 font-black uppercase mb-1">Beers / Day</label>
                            <input type="number" id="qtyBeers" value="2" class="w-full bg-slate-800 border border-slate-700 rounded-xl p-4 text-sm outline-none">
                        </div>
                    </div>
                    <button onclick="decodeDrinks()" class="w-full bg-cyan-500 text-slate-900 font-black py-4 rounded-xl text-sm uppercase hover:bg-cyan-400 transition transform active:scale-95">Analyze Value</button>
                    <div id="drinkRes" class="hidden p-4 bg-slate-950 rounded-xl border border-slate-800 text-center font-bold text-lg text-green-400"></div>
                </div>
            </section>

            <section class="bg-slate-900 border border-slate-800 p-6 rounded-3xl shadow-2xl">
                <h2 class="text-cyan-400 font-bold mb-6 uppercase text-[11px] tracking-widest italic">Baggage Weight Converter</h2>
                <div class="space-y-4">
                    <div>
                        <label class="block text-[10px] text-slate-500 font-black uppercase mb-1">Current Weight</label>
                        <div class="flex gap-2">
                            <input type="number" id="weightInput" value="50" class="flex-1 bg-slate-800 border border-slate-700 rounded-xl p-4 text-sm outline-none">
                            <select id="unit" class="bg-slate-800 border border-slate-700 rounded-xl p-4 text-sm font-bold text-cyan-400 uppercase">
                                <option value="lb">LB</option>
                                <option value="kg">KG</option>
                            </select>
                        </div>
                    </div>
                    <button onclick="convertWeight()" class="w-full bg-slate-700 text-white font-bold py-4 rounded
