<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Decode My Travel | Logistics Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-track { background: #0f172a; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #22d3ee; border-radius: 10px; }
        .tab-active { border-bottom: 2px solid #22d3ee; color: #22d3ee !important; font-weight: 900; }
        .chip-checkbox { display: none; }
        .chip-label { cursor: pointer; border: 1px solid #334155; display: flex; align-items: center; justify-content: center; height: 3rem; border-radius: 0.75rem; font-size: 0.7rem; text-align: center; }
        .chip-checkbox:checked + .chip-label { background-color: #06b6d4; border-color: #06b6d4; color: #0f172a; font-weight: 900; }
        .hidden { display: none; }
    </style>
</head>
<body class="bg-slate-950 text-white font-sans min-h-screen p-4 md:p-10">

    <header class="max-w-7xl mx-auto mb-10 text-center">
        <h1 class="text-4xl font-black text-cyan-400 tracking-tighter uppercase">Decode My Travel</h1>
        <p class="text-slate-500 text-xs font-bold uppercase mt-2 tracking-widest italic">Official 2026 Logistics Hub</p>
    </header>

    <main class="max-w-7xl mx-auto grid grid-cols-1 lg:grid-cols-12 gap-8 items-start">

        <div class="lg:col-span-5 space-y-6">
            
            <section class="bg-slate-900 border border-slate-800 p-6 rounded-3xl shadow-2xl">
                <h2 class="text-cyan-400 font-bold mb-6 uppercase text-[11px] tracking-widest italic">Drink Package Decoder</h2>
                <div class="space-y-4">
                    <div>
                        <label class="block text-[10px] text-slate-500 font-bold uppercase mb-1">Package Cost / Day ($)</label>
                        <input type="number" id="pkg_price" value="75" class="w-full bg-slate-800 border border-slate-700 rounded-xl p-4 text-sm outline-none">
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div><label class="block text-[10px] text-slate-500 font-bold uppercase mb-1">Avg Cocktail $</label><input type="number" id="avg_cocktail" value="14" class="w-full bg-slate-800 border border-slate-700 rounded-xl p-4 text-sm outline-none"></div>
                        <div><label class="block text-[10px] text-slate-500 font-bold uppercase mb-1">Avg Beer $</label><input type="number" id="avg_beer" value="8" class="w-full bg-slate-800 border border-slate-700 rounded-xl p-4 text-sm outline-none"></div>
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div><label class="block text-[10px] text-slate-500 font-bold uppercase mb-1">Cocktails / Day</label><input type="number" id="qty_cocktails" value="4" class="w-full bg-slate-800 border border-slate-700 rounded-xl p-4 text-sm outline-none"></div>
                        <div><label class="block text-[10px] text-slate-500 font-bold uppercase mb-1">Beers / Day</label><input type="number" id="qty_beers" value="2" class="w-full bg-slate-800 border border-slate-700 rounded-xl p-4 text-sm outline-none"></div>
                    </div>
                    <button onclick="calculateDrinks()" class="w-full bg-cyan-500 text-slate-900 font-black py-4 rounded-xl text-sm uppercase hover:bg-cyan-400 transition">Analyze Value</button>
                    <div id="drink_res" class="hidden mt-4 p-4 bg-slate-950 rounded-xl border border-slate-800 text-center font-bold text-lg"></div>
                </div>
            </section>

            <section class="bg-slate-900 border border-slate-800 p-6 rounded-3xl shadow-2xl">
                <h2 class="text-cyan-400 font-bold mb-6 uppercase text-[11px] tracking-widest italic">Baggage Weight Converter</h2>
                <div class="space-y-4">
                    <div class="flex gap-2">
                        <input type="number" id="bag_val" value="50" class="flex-1 bg-slate-800 border border-slate-700 rounded-xl p-4 text-sm outline-none">
                        <select id="bag_unit" class="bg-slate-800 border border-slate-700 rounded-xl p-4 text-sm font-bold text-cyan-400 uppercase">
                            <option value="lb">LB</option>
                            <option value="kg">KG</option>
                        </select>
                    </div>
                    <button onclick="calculateWeight()" class="w-full bg-slate-700 text-white font-bold py-4 rounded-xl text-sm uppercase hover:bg-slate-600 transition">Convert</button>
                    <div id="bag_res" class="hidden mt-4 p-4 bg-slate-950 rounded-xl border border-slate-800 text-center font-mono text-cyan-400 text-xl"></div>
                </div>
            </section>

            <section class="bg-slate-900 border border-slate-800 p-6 rounded-3xl shadow-2xl">
                <h2 class="text-cyan-400 font-bold mb-4 uppercase text-[11px] tracking-widest italic">Tipping Etiquette Compass</h2>
                <div class="grid grid-cols-2 gap-2 mb-6">
                    <div><input type="checkbox" class="t-check chip-checkbox" id="t-mex" data-tip="🇲🇽 <strong>MEXICO:</strong> 10-15% for guides. USD $1 bills are king. Check for 'Propina' line item."><label for="t-mex" class="chip-label">MEXICO</label></div>
                    <div><input type="checkbox" class="t-check chip-checkbox" id="t-bah" data-tip="🇧🇸 <strong>BAHAMAS:</strong> 15% service charge usually included in Nassau. $2-5 per bag for porters."><label for="t-bah" class="chip-label">BAHAMAS</label></div>
                    <div><input type="checkbox" class="t-check chip-checkbox" id="t-car" data-tip="🇰🇳 <strong>CARIBBEAN:</strong> Standard 15% for taxi tours unless 'Service Included' is noted on receipt."><label for="t-car" class="chip-label">CARIBBEAN</label></div>
                    <div><input type="checkbox" class="t-check chip-checkbox" id="t-eur" data-tip="🇪🇺 <strong>EUROPE:</strong> Modest tipping. €1-2 for drinks; €5 for dinner. Taxi tipping not expected."><label for="t-eur" class="chip-label">EUROPE</label></div>
                </div>
                <button onclick="calculateTips()" class="w-full bg-cyan-500 text-slate-900 font-black py-4 rounded-xl text-sm uppercase hover:bg-cyan-400 transition">Generate Tips Sheet</button>
                <div id="tip_res" class="hidden mt-4 p-5 bg-slate-950 rounded-xl border border-slate-800 space-y-4 text-[11px] text-slate-300 leading-relaxed"></div>
            </section>
        </div>

        <div class="lg:col-span-7">
            <div class="bg-slate-900 border border-slate-8
